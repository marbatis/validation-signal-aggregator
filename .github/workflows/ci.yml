name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: ruff check .
      - run: pytest -q

  smoke:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Start app
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/app.log 2>&1 &
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:8000/api/health > /dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8000/api/health > /dev/null
      - name: Smoke checks
        run: |
          curl -fsS http://127.0.0.1:8000/api/health > /dev/null
          curl -fsS http://127.0.0.1:8000/ > /dev/null
          curl -fsS -X POST http://127.0.0.1:8000/api/analyze/sample/healthy_build > /dev/null
      - name: Logs on failure
        if: failure()
        run: cat /tmp/app.log
